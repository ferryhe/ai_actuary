<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Agent-governed actuarial reserving workflow</title>
  <desc id="desc">A reserving workflow where deterministic tools calculate reserve values, an agent runtime coordinates workflow steps, an actuarial constitution enforces controls, and actuaries review flagged cases.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#245c73"/>
    </marker>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #17313b; }
      .label { font: 700 20px Arial, sans-serif; fill: #17313b; }
      .small { font: 16px Arial, sans-serif; fill: #2d4650; }
      .note { font: 15px Arial, sans-serif; fill: #4f626b; }
      .box { fill: #f7fbfc; stroke: #245c73; stroke-width: 3; rx: 14; }
      .green { fill: #eef8f0; stroke: #3d7f55; }
      .orange { fill: #fff5e8; stroke: #c47b25; }
      .blue { fill: #edf6fb; stroke: #245c73; }
      .purple { fill: #f4f0fb; stroke: #6c5a9e; }
      .line { fill: none; stroke: #245c73; stroke-width: 3; marker-end: url(#arrow); }
      .thin { fill: none; stroke: #6b8a96; stroke-width: 2.5; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1200" height="760" fill="#ffffff"/>
  <text x="600" y="46" text-anchor="middle" class="title">Agent-Governed Actuarial Reserving Workflow</text>

  <rect x="44" y="98" width="210" height="116" class="box orange"/>
  <text x="149" y="132" text-anchor="middle" class="label">Intake</text>
  <text x="149" y="160" text-anchor="middle" class="small">Loss triangles</text>
  <text x="149" y="184" text-anchor="middle" class="small">Scenario metadata</text>
  <text x="149" y="208" text-anchor="middle" class="small">Business context</text>

  <rect x="330" y="98" width="246" height="116" class="box green"/>
  <text x="453" y="132" text-anchor="middle" class="label">Deterministic</text>
  <text x="453" y="157" text-anchor="middle" class="label">Reserving Engine</text>
  <text x="453" y="185" text-anchor="middle" class="small">Chainladder, BF, diagnostics</text>
  <text x="453" y="209" text-anchor="middle" class="small">No LLM-generated numbers</text>

  <rect x="680" y="98" width="260" height="116" class="box blue"/>
  <text x="810" y="132" text-anchor="middle" class="label">Agent Runtime</text>
  <text x="810" y="157" text-anchor="middle" class="label">Adapter</text>
  <text x="810" y="185" text-anchor="middle" class="small">OpenClaw, Hermes, or future agents</text>
  <text x="810" y="209" text-anchor="middle" class="small">Coordinates tools and stages</text>

  <rect x="44" y="318" width="250" height="128" class="box purple"/>
  <text x="169" y="352" text-anchor="middle" class="label">Retrieval and Context</text>
  <text x="169" y="382" text-anchor="middle" class="small">Actuarial guidance</text>
  <text x="169" y="407" text-anchor="middle" class="small">Prior workpaper notes</text>
  <text x="169" y="432" text-anchor="middle" class="small">Benchmark case metadata</text>

  <rect x="366" y="292" width="310" height="180" class="box"/>
  <text x="521" y="328" text-anchor="middle" class="label">Actuarial Constitution</text>
  <text x="521" y="360" text-anchor="middle" class="small">Hard constraints</text>
  <text x="521" y="386" text-anchor="middle" class="small">Soft guidance checks</text>
  <text x="521" y="412" text-anchor="middle" class="small">Review triggers</text>
  <text x="521" y="438" text-anchor="middle" class="small">Audit artifact requirements</text>

  <rect x="754" y="318" width="250" height="128" class="box blue"/>
  <text x="879" y="352" text-anchor="middle" class="label">LLM Narrative Draft</text>
  <text x="879" y="382" text-anchor="middle" class="small">Explains reserve movement</text>
  <text x="879" y="407" text-anchor="middle" class="small">Cites tool outputs</text>
  <text x="879" y="432" text-anchor="middle" class="small">Flags uncertainty</text>

  <rect x="248" y="566" width="246" height="116" class="box orange"/>
  <text x="371" y="600" text-anchor="middle" class="label">Human Review Gate</text>
  <text x="371" y="630" text-anchor="middle" class="small">Credentialed actuary</text>
  <text x="371" y="655" text-anchor="middle" class="small">Approve, correct, or reject</text>

  <rect x="568" y="566" width="252" height="116" class="box green"/>
  <text x="694" y="600" text-anchor="middle" class="label">Final Workpaper</text>
  <text x="694" y="630" text-anchor="middle" class="small">Reserve indication</text>
  <text x="694" y="655" text-anchor="middle" class="small">Narrative and review record</text>

  <rect x="896" y="566" width="240" height="116" class="box purple"/>
  <text x="1016" y="600" text-anchor="middle" class="label">Audit and Feedback</text>
  <text x="1016" y="630" text-anchor="middle" class="small">Replayable run history</text>
  <text x="1016" y="655" text-anchor="middle" class="small">RLHF-style corrections</text>

  <path d="M 254 156 H 320" class="line"/>
  <path d="M 576 156 H 670" class="line"/>
  <path d="M 810 214 V 288" class="line"/>
  <path d="M 294 382 H 356" class="line"/>
  <path d="M 676 382 H 744" class="line"/>
  <path d="M 879 446 C 879 520 780 520 734 560" class="line"/>
  <path d="M 521 472 C 521 525 428 525 390 560" class="line"/>
  <path d="M 494 624 H 558" class="line"/>
  <path d="M 820 624 H 886" class="line"/>
  <path d="M 1016 566 C 1016 510 958 501 928 456" class="thin"/>
  <path d="M 453 214 C 453 248 495 251 514 282" class="thin"/>
  <path d="M 149 214 C 149 262 169 272 169 308" class="thin"/>

  <text x="600" y="724" text-anchor="middle" class="note">The actuarial workflow is stable; OpenClaw, Hermes, or later agents enter through the runtime adapter.</text>
</svg>
