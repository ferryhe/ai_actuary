<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Comparative benchmark for agent-governed reserving workflows</title>
  <desc id="desc">A benchmark architecture comparing LLM baselines with an agent-governed reserving workflow implemented through example runtimes such as OpenClaw and Hermes.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#245c73"/>
    </marker>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #17313b; }
      .section { font: 700 22px Arial, sans-serif; fill: #17313b; }
      .label { font: 700 18px Arial, sans-serif; fill: #17313b; }
      .small { font: 15px Arial, sans-serif; fill: #2d4650; }
      .note { font: 15px Arial, sans-serif; fill: #4f626b; }
      .box { fill: #f7fbfc; stroke: #245c73; stroke-width: 3; rx: 14; }
      .green { fill: #eef8f0; stroke: #3d7f55; }
      .orange { fill: #fff5e8; stroke: #c47b25; }
      .blue { fill: #edf6fb; stroke: #245c73; }
      .purple { fill: #f4f0fb; stroke: #6c5a9e; }
      .gray { fill: #f4f6f7; stroke: #7a8a91; }
      .line { fill: none; stroke: #245c73; stroke-width: 3; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1200" height="760" fill="#ffffff"/>
  <text x="600" y="46" text-anchor="middle" class="title">Comparative Reserving Benchmark Architecture</text>

  <text x="200" y="92" text-anchor="middle" class="section">Model-Centric Baselines</text>
  <rect x="62" y="118" width="276" height="92" class="box gray"/>
  <text x="200" y="151" text-anchor="middle" class="label">Out-of-the-Box LLM</text>
  <text x="200" y="180" text-anchor="middle" class="small">Raw triangle text and prompt</text>

  <rect x="62" y="238" width="276" height="92" class="box gray"/>
  <text x="200" y="271" text-anchor="middle" class="label">Prompt-Engineered LLM</text>
  <text x="200" y="300" text-anchor="middle" class="small">Structured prompt, no tool control</text>

  <rect x="62" y="358" width="276" height="92" class="box gray"/>
  <text x="200" y="391" text-anchor="middle" class="label">RAG Baseline</text>
  <text x="200" y="420" text-anchor="middle" class="small">Context retrieval without governance</text>

  <rect x="62" y="478" width="276" height="92" class="box gray"/>
  <text x="200" y="511" text-anchor="middle" class="label">Fine-Tuned Pilot</text>
  <text x="200" y="540" text-anchor="middle" class="small">Synthetic reserving explanations</text>

  <text x="600" y="92" text-anchor="middle" class="section">Shared Benchmark</text>
  <rect x="420" y="126" width="360" height="248" class="box orange"/>
  <text x="600" y="164" text-anchor="middle" class="label">Synthetic Reserving Data</text>
  <text x="600" y="196" text-anchor="middle" class="small">Realistic reserving situations</text>
  <text x="600" y="228" text-anchor="middle" class="small">Routine triangles</text>
  <text x="600" y="258" text-anchor="middle" class="small">Inflation and settlement shifts</text>
  <text x="600" y="288" text-anchor="middle" class="small">Missing data and quality issues</text>
  <text x="600" y="318" text-anchor="middle" class="small">Cases requiring escalation</text>

  <rect x="420" y="438" width="360" height="180" class="box green"/>
  <text x="600" y="474" text-anchor="middle" class="label">Scoring Rubrics</text>
  <text x="600" y="508" text-anchor="middle" class="small">Numeric consistency</text>
  <text x="600" y="536" text-anchor="middle" class="small">Explanation quality</text>
  <text x="600" y="564" text-anchor="middle" class="small">Rule compliance and escalation</text>
  <text x="600" y="592" text-anchor="middle" class="small">Audit trail completeness</text>

  <text x="1000" y="92" text-anchor="middle" class="section">Agent-Governed Workflow</text>
  <rect x="862" y="118" width="276" height="104" class="box blue"/>
  <text x="1000" y="151" text-anchor="middle" class="label">Portable Workflow Spec</text>
  <text x="1000" y="180" text-anchor="middle" class="small">Stages, rules, artifacts</text>
  <text x="1000" y="202" text-anchor="middle" class="small">Runtime-neutral adapter</text>

  <rect x="862" y="260" width="276" height="92" class="box purple"/>
  <text x="1000" y="293" text-anchor="middle" class="label">OpenClaw Example</text>
  <text x="1000" y="322" text-anchor="middle" class="small">Gateway and control-plane style runtime</text>

  <rect x="862" y="380" width="276" height="92" class="box purple"/>
  <text x="1000" y="413" text-anchor="middle" class="label">Hermes Example</text>
  <text x="1000" y="442" text-anchor="middle" class="small">Memory, skills, and MCP-style tools</text>

  <rect x="862" y="500" width="276" height="92" class="box purple"/>
  <text x="1000" y="533" text-anchor="middle" class="label">Future Agent Adapter</text>
  <text x="1000" y="562" text-anchor="middle" class="small">Same actuarial workflow contract</text>

  <path d="M 338 164 H 410" class="line"/>
  <path d="M 338 284 H 410" class="line"/>
  <path d="M 338 404 H 410" class="line"/>
  <path d="M 338 524 H 410" class="line"/>
  <path d="M 780 250 H 850" class="line"/>
  <path d="M 1000 222 V 250" class="line"/>
  <path d="M 1000 352 V 370" class="line"/>
  <path d="M 1000 472 V 490" class="line"/>
  <path d="M 1000 592 C 1000 650 685 655 624 626" class="line"/>

  <text x="600" y="704" text-anchor="middle" class="note">The evaluation asks whether governance, deterministic tools, review gates, and audit artifacts improve actuarial usefulness across agent runtimes.</text>
</svg>
